apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  generateName: tax-calculator-delivery-
spec:
  pipelineRef:
    name: tax-calculator-delivery
  params:
    - name: git-url
      value: https://github.com/YOUR_USER/tax-calculator.git
    - name: git-revision
      value: main
    - name: image
      value: us.icr.io/YOUR_NAMESPACE/tax-calculator:latest
    - name: application
      value: tax-calculator
  workspaces:
    - name: shared-data
      volumeClaimTemplate:
        spec:
          accessModes: [ReadWriteOnce]
          resources:
            requests:
              storage: 1Gi
